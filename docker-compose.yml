version: '3.8'

services:
  api:
    build: .
    container_name: toolboxdb-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override the Redis URL to point to the local Docker service
      - REDIS_URL=redis://redis:6379/0
      # Ensure DATABASE_TYPE matches your .env, typically SUPABASE or POSTGRESQL
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: toolboxdb-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
