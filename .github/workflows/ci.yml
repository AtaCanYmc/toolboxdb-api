name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test:
    name: Test (Python 3.11) with Redis service
    runs-on: ubuntu-latest

    env:
      DATABASE_TYPE: "POSTGRESQL"
      LOCAL_DATABASE_URL: "postgresql://mock:mock@localhost:5432/mock"
      DATABASE_URL: "postgresql://mock:mock@localhost:5432/mock"
      # Runner çıplak Ubuntu kullandığı için Redis'e 127.0.0.1 üzerinden erişecek
      REDIS_HOST: "127.0.0.1"
      REDIS_PORT: 6379
      REDIS_URL: "redis://127.0.0.1:6379"
      PYTHONUNBUFFERED: 1

    services:
      redis:
        image: redis:alpine
        # Redis portunu dışarıya (runner makinesine) map ediyoruz
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 5s
          --health-timeout 2s
          --health-retries 5

    steps:
      # 1) Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Set up Python 3.11 (pip cache entegre olarak geliyor)
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3) Upgrade pip and install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      # 4) Lint / formatting check (fail the build on issues)
      - name: Lint / Format check (black + flake8)
        run: |
          python -m pip install --upgrade black==24.8.0 flake8
          black --check .
          flake8 .

      # 5) Wait for Redis to be fully responsive on localhost
      - name: Wait for Redis to be ready
        run: |
          python -c "
          import socket, time, sys, os
          host = os.getenv('REDIS_HOST', '127.0.0.1')
          port = int(os.getenv('REDIS_PORT', 6379))
          timeout = 30
          start = time.time()
          print(f'Waiting for Redis at {host}:{port}...')
          while True:
              try:
                  s = socket.socket()
                  s.settimeout(1)
                  s.connect((host, port))
                  s.close()
                  print('Redis is officially up and running!')
                  sys.exit(0)
              except Exception as e:
                  if time.time() - start > timeout:
                      print(f'Timed out waiting for Redis on {host}:{port}: {e}')
                      sys.exit(1)
                  time.sleep(1)
          "

      # 6) Run tests (pytest)
      - name: Run tests with pytest
        run: |
          python --version
          pip --version
          pytest -v
        env:
          REDIS_URL: ${{ env.REDIS_URL }}
          REDIS_HOST: ${{ env.REDIS_HOST }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DATABASE_TYPE: ${{ env.DATABASE_TYPE }}